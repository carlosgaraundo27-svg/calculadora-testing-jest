# .github/workflows/ci-playwright.yml
# Pipeline: ejecuta los tests E2E de Playwright en cada Pull Request

name: CI — Tests E2E Playwright

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    name: Ejecutar suite Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Instalar navegadores Playwright
        run: npx -y playwright@1.54.2 install --with-deps chromium

      - name: Ejecutar tests E2E
        env:
          CI: true
        run: npx -y playwright@1.54.2 test --reporter=line

      - name: Subir reporte Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7