# .github/workflows/ci-jest.yml
# Versión actualizada con coverage

name: CI — Tests + Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-jest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-y-calidad:
    name: Tests + Cobertura + Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Tests + Quality Gate de cobertura
        run: npm run test:coverage

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report/
          if-no-files-found: ignore
          retention-days: 7